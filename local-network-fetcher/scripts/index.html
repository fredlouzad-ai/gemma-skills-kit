<!DOCTYPE html>
<html lang="en">
<head></head>
<body>
    <script>
        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                const parameters = JSON.parse(data);
                const { ip_address, path, method = "GET" } = parameters;

                // Safety check: Ensure the IP is a local network IP (192.168.x.x, 10.x.x.x, 127.0.0.1, etc.)
                const isLocalIP = /^(192\.168|10\.|172\.(1[6-9]|2[0-9]|3[0-1])|127\.0\.0\.1|localhost)/.test(ip_address);
                
                if (!isLocalIP) {
                    throw new Error("Security violation: This skill can only query local network IP addresses.");
                }

                const url = `http://${ip_address}${path.startsWith('/') ? path : '/' + path}`;
                
                const response = await fetch(url, { method });
                
                let responseData;
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    responseData = await response.json();
                } else {
                    responseData = await response.text();
                }

                return JSON.stringify({
                    result: {
                        status: response.ok ? "success" : "http_error",
                        http_status: response.status,
                        url_queried: url,
                        data: responseData
                    }
                });

            } catch (e) {
                console.error(e);
                return JSON.stringify({
                    error: `Failed: ${e.message}`
                });
            }
        };
    </script>
</body>
</html>
